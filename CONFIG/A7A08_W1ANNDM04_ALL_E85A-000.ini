[SPEC]
### Mold NND
# 1. EPC Sensor Offset (Shoulder Line or Cutting Height)
SPEC_TCH_USL			        = 1.400
SPEC_TCH_REF			        = 0.700
SPEC_TCH_LSL			        = 0.000

# 2. Mold Interval Offset (Tab Pitch)
SPEC_TP_USL			        = 93.15
SPEC_TP_REF			        = 93.00
SPEC_TP_LSL			        = 92.85




[MACHINE]
AUTO_ON_FUNCTION = "USE"  # USE / UNUSE   
AUTO_ON_CHECK_TIME = 180   # 자동보정 꺼진 시간 확인 (초)

# EPC수동보정 "+" 버튼을 눌렀을 때, 1: OP방향, -1: MC방향
EPC_DIRECTION		= 1
SCALE_READ_PLC		= 100
SCALE_WRITE_PLC		= 100
SCALE_WRITE_EPC		= 1000
SCALE_WRITE_MOLD	= 1000

# Control Proportional Gain (ex, 0.5 = 50%)
GAIN_TCH		= 0.4
GAIN_TP			= 0.3

# Control Cycle (TP control cycle must be at least 100)
CONTROL_CYCLE_TCH	= 75
CONTROL_CYCLE_TP	= 150

# Lot Change Parameter for EPC
GAIN_TCH_LC		= 0.3
CONTROL_CYCLE_TCH_LC	= 20

# Offset Limit (absolute value)
OFFSET_TCH_LIMIT    =0.400
OFFSET_TP_LIMIT		=0.030

# Data Gathering Tolerance : (LSL-TOL) ~ (USL+TOL)
GATHER_TOL_EPC	= 0.70
GATHER_TOL_TP	= 0.15

# For Mold Tab Pitch
PVAR_CRITERIA	= 0.001 # Variance Criteria by each cavity group

# Command Offset (Y축 Reference + Command offset -> Target값 개념)
CMD_OFFSET_Y	= 0.0